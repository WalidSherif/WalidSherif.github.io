<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}Walid Sherif</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="site-brand" href="{{ '/' | relative_url }}">
        <span class="site-brand__name">Walid Sherif</span>
        <span class="site-brand__tag">Engineering Portfolio</span>
      </a>

      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}#projects">Projects</a>
        <a href="{{ '/' | relative_url }}#expertise">Expertise</a>
        <a href="{{ '/' | relative_url }}#about">About</a>
        <a href="{{ '/' | relative_url }}#contact">Contact</a>
      </nav>

      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">
        Dark mode
      </button>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> Walid Sherif. All rights reserved.</p>
    </div>
  </footer>

  <script src="{{ '/assets/main.js' | relative_url }}"></script>
</body>
</html>
