<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand-name">Walid Sherif</span>
          <span class="brand-role">Engineering Portfolio</span>
        </a>

        <nav class="site-nav" aria-label="Primary">
          <a href="{{ '/' | relative_url }}#projects">Projects</a>
          <a href="{{ '/' | relative_url }}#expertise">Expertise</a>
          <a href="{{ '/' | relative_url }}#contact">Contact</a>
        </nav>

        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">
          Dark mode
        </button>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>&copy; <span id="current-year"></span> Walid Sherif. All rights reserved.</p>
        <p>
          <a href="mailto:waleedshereef65@gmail.com">waleedshereef65@gmail.com</a>
          <span class="footer-sep">|</span>
          <a href="https://www.linkedin.com/in/walid-sherif-205522318/" target="_blank" rel="noopener">LinkedIn</a>
        </p>
      </div>
    </footer>

    <script src="{{ '/assets/main.js' | relative_url }}"></script>
  </body>
</html>
