title: Walid Sherif — Engineering Portfolio
email: waleedshereef65@gmail.com
description: Portfolio of engineering projects in CFD, FEA, control systems, power electronics, and renewable energy.
url: "https://walidsherif.github.io"
baseurl: ""

collections:
  projects:
    output: true
    permalink: /projects/:path/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: projects
    values:
      layout: project

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

github:
  is_project_page: false
